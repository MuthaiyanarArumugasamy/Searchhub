<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search - SearchHub AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#0b1120;

color:#fff;

}

header{

display:flex;

align-items:center;

justify-content:space-between;

padding:18px 30px;

background:#111827;

border-bottom:1px solid rgba(255,255,255,.08);

position:sticky;

top:0;

}

.logo{

font-size:24px;

font-weight:700;

}

.search-bar{

display:flex;

align-items:center;

gap:10px;

width:55%;

}

.search-bar input{

flex:1;

padding:15px;

border:none;

outline:none;

border-radius:12px;

background:#1f2937;

color:white;

font-size:16px;

}

.search-bar button{

padding:15px 22px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

}

.tabs{

display:flex;

gap:15px;

padding:20px 30px;

background:#111827;

}

.tabs button{

padding:10px 18px;

border:none;

border-radius:25px;

background:#1f2937;

color:white;

cursor:pointer;

}

.tabs button:hover{

background:#2563eb;

}

.container{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;

padding:30px;

}

.results{

display:flex;

flex-direction:column;

gap:20px;

}

.result{

background:#111827;

padding:22px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.result:hover{

transform:translateY(-4px);

border-color:#2563eb;

}

.result a{

color:#60a5fa;

font-size:22px;

text-decoration:none;

}

.result p{

margin-top:12px;

color:#94a3b8;

line-height:1.7;

}

.sidebar{

display:flex;

flex-direction:column;

gap:20px;

}

.box{

background:#111827;

padding:22px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

}

.box h3{

margin-bottom:15px;

}

.box ul{

list-style:none;

}

.box li{

padding:8px 0;

color:#94a3b8;

cursor:pointer;

}

.box li:hover{

color:#60a5fa;

}

</style>

</head>

<body>

<header>

<div class="logo">

🔍 SearchHub AI

</div>

<div class="search-bar">

<input
type="text"
id="searchInput"
placeholder="Search anything...">

<button onclick="searchNow()">

Search

</button>

</div>

</header>

<div class="tabs">

<button>All</button>

<button>Images</button>

<button>Videos</button>

<button>News</button>

<button>PDF</button>

<button>Code</button>

</div>

<div class="container">

<div class="results" id="results">

<div class="result">

<a href="#">Welcome to SearchHub AI</a>

<p>
Start searching to see results here. This demo currently shows sample results.
</p>

</div>

</div>

<div class="sidebar">

<div class="box">

<h3>Trending</h3>

<ul>

<li>Artificial Intelligence</li>

<li>Python Tutorial</li>

<li>React JS</li>

<li>HTML CSS</li>

<li>Machine Learning</li>

</ul>

</div>

<div class="box">

<h3>Recent Searches</h3>

<ul id="historyList">

<li>No recent searches</li>

</ul>

</div>

</div>

</div>

<script>

function searchNow(){

const q=document.getElementById("searchInput").value.trim();

if(q===""){

alert("Enter a search term");

return;

}

// Save history

let history=JSON.parse(localStorage.getItem("history"))||[];

history.unshift(q);

history=history.slice(0,10);

localStorage.setItem("history",JSON.stringify(history));

loadHistory();

// Demo search results

document.getElementById("results").innerHTML=`

<div class="result">

<a href="https://www.google.com/search?q=${encodeURIComponent(q)}" target="_blank">

Google Results for "${q}"

</a>

<p>

Click the title above to open Google search results for <b>${q}</b>.

</p>

</div>

<div class="result">

<a href="#">

SearchHub AI Summary</a>

<p>

This is where your AI-generated summary or your own backend search results can appear.

</p>

</div>

`;

}

function loadHistory(){

const list=document.getElementById("historyList");

if(!list) return;

const history=JSON.parse(localStorage.getItem("history"))||[];

list.innerHTML="";

if(history.length===0){

list.innerHTML="<li>No recent searches</li>";

return;

}

history.forEach(item=>{

const li=document.createElement("li");

li.textContent=item;

li.onclick=()=>{

document.getElementById("searchInput").value=item;

};

list.appendChild(li);

});

}

loadHistory();

</script>

</body>

</html>
