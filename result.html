<!DOCTYPE html>
<html>
<head>
<title>Smart Search Hub</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:400px;
}

input{
    width:90%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>

<body>

<div class="box">

<h1>Search Hub</h1>

<p>Find information quickly</p>

<input id="search" placeholder="Type your search...">

<br>

<button onclick="searchNow()">Search</button>

</div>


<script>

function searchNow(){

let query=document.getElementById("search").value;

if(query==""){
alert("Enter search text");
return;
}

window.open(
"result.html?q="+encodeURIComponent(query),
"_blank"
);

}

</script>


</body>
</html>
