<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Search | SearchHub AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#0b1120;
color:#fff;

}

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:#111827;

}

.logo{

font-size:28px;
font-weight:700;

}

.search{

display:flex;
gap:10px;
width:60%;

}

.search input{

flex:1;

padding:15px;

background:#1f2937;

border:none;

outline:none;

border-radius:12px;

color:white;

}

.search button{

padding:15px 25px;

background:#2563eb;

border:none;

color:white;

border-radius:12px;

cursor:pointer;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

padding:40px;

}

.image{

background:#111827;

border-radius:18px;

overflow:hidden;

transition:.3s;

}

.image:hover{

transform:translateY(-8px);

}

.image img{

width:100%;

height:220px;

object-fit:cover;

}

.image h3{

padding:15px;

font-size:18px;

}

footer{

text-align:center;

padding:30px;

color:#94a3b8;

}

</style>

</head>

<body>

<header>

<div class="logo">

🖼 SearchHub AI

</div>

<div class="search">

<input

type="text"

id="imgSearch"

placeholder="Search Images...">

<button onclick="searchImage()">

Search

</button>

</div>

</header>

<div class="gallery" id="gallery">

<div class="image">

<img src="https://picsum.photos/500/300?1">

<h3>Nature</h3>

</div>

<div class="image">

<img src="https://picsum.photos/500/300?2">

<h3>Technology</h3>

</div>

<div class="image">

<img src="https://picsum.photos/500/300?3">

<h3>Mountains</h3>

</div>

<div class="image">

<img src="https://picsum.photos/500/300?4">

<h3>Programming</h3>

</div>

<div class="image">

<img src="https://picsum.photos/500/300?5">

<h3>Artificial Intelligence</h3>

</div>

<div class="image">

<img src="https://picsum.photos/500/300?6">

<h3>Travel</h3>

</div>

</div>

<footer>

©2026 SearchHub AI

</footer>

<script>

function searchImage(){

let q=document.getElementById("imgSearch").value;

if(q==""){

alert("Enter image name");

return;

}

window.open(

"https://www.google.com/search?tbm=isch&q="+

encodeURIComponent(q),

"_blank"

);

}

</script>

</body>
</html>
