<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SearchHub - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:400px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:30px;
color:#2563eb;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#1d4ed8;
}

p{
text-align:center;
margin-top:20px;
}

a{
color:#2563eb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

document
.getElementById("loginBtn")
.onclick = async()=>{

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

if(!email || !password){

alert("Enter email and password");

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href="dashboard.html";

}

catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
