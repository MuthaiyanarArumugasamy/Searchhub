<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | SearchHub AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#0b1120;

color:white;

}

.container{

width:430px;

background:#111827;

padding:40px;

border-radius:22px;

border:1px solid rgba(255,255,255,.08);

box-shadow:0 20px 45px rgba(0,0,0,.4);

}

.logo{

text-align:center;

margin-bottom:30px;

}

.logo i{

font-size:55px;

color:#3b82f6;

margin-bottom:15px;

}

.logo h1{

font-size:30px;

}

.logo p{

color:#94a3b8;

margin-top:10px;

}

.input{

margin-top:18px;

}

.input label{

display:block;

margin-bottom:8px;

font-size:15px;

}

.input input{

width:100%;

padding:15px;

border:none;

outline:none;

background:#1f2937;

color:white;

border-radius:12px;

font-size:15px;

}

.signup{

width:100%;

padding:16px;

margin-top:25px;

background:linear-gradient(135deg,#2563eb,#4f46e5);

border:none;

border-radius:12px;

font-size:17px;

color:white;

cursor:pointer;

}

.signup:hover{

opacity:.9;

}

.google{

width:100%;

padding:15px;

margin-top:15px;

background:#1f2937;

border:none;

color:white;

border-radius:12px;

cursor:pointer;

}

.bottom{

margin-top:20px;

text-align:center;

color:#94a3b8;

}

.bottom a{

color:#60a5fa;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-brain"></i>

<h1>SearchHub AI</h1>

<p>Create your free account</p>

</div>

<div class="input">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Your Name">

</div>

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email Address">

</div>

<div class="input">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Create Password">

</div>

<div class="input">

<label>Confirm Password</label>

<input
type="password"
id="confirm"
placeholder="Confirm Password">

</div>

<button class="signup" onclick="signup()">

Create Account

</button>

<button class="google">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<div class="bottom">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<script>

function signup(){

let name=document.getElementById("name").value;

let email=document.getElementById("email").value;

let pass=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

if(name==""||email==""||pass==""||confirm==""){

alert("Fill all fields");

return;

}

if(pass!=confirm){

alert("Passwords do not match");

return;

}

localStorage.setItem("user",name);

window.location="dashboard.html";

}

</script>

</body>

</html>
