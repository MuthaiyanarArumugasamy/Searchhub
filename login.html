<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Login | SearchHub AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#0b1120;

color:white;

}

.card{

width:420px;

background:#111827;

padding:40px;

border-radius:20px;

border:1px solid rgba(255,255,255,.08);

box-shadow:0 15px 40px rgba(0,0,0,.4);

}

.logo{

text-align:center;

margin-bottom:30px;

}

.logo i{

font-size:50px;

color:#3b82f6;

margin-bottom:15px;

}

.logo h2{

font-size:30px;

}

.logo p{

color:#94a3b8;

margin-top:8px;

}

.input{

margin-top:18px;

}

.input label{

display:block;

margin-bottom:8px;

}

.input input{

width:100%;

padding:15px;

background:#1f2937;

border:none;

outline:none;

border-radius:12px;

color:white;

font-size:15px;

}

.loginBtn{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#2563eb,#4f46e5);

color:white;

font-size:17px;

cursor:pointer;

}

.loginBtn:hover{

opacity:.9;

}

.google{

margin-top:15px;

width:100%;

padding:15px;

background:#1f2937;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

}

.bottom{

text-align:center;

margin-top:20px;

color:#94a3b8;

}

.bottom a{

color:#60a5fa;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<i class="fa-solid fa-brain"></i>

<h2>SearchHub AI</h2>

<p>Welcome Back</p>

</div>

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter email">

</div>

<div class="input">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter password">

</div>

<button class="loginBtn" onclick="login()">

Login

</button>

<button class="google">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<div class="bottom">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</div>

<script>

function login(){

const email=document.getElementById("email").value;

const pass=document.getElementById("password").value;

if(email==""||pass==""){

alert("Please fill all fields");

return;

}

localStorage.setItem("user",email);

window.location="dashboard.html";

}

</script>

</body>

</html>
