<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library | SearchHub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0b1120;
color:white;
}

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:#111827;

border-bottom:1px solid rgba(255,255,255,.08);

}

.logo{

font-size:28px;
font-weight:700;

}

.addBtn{

padding:12px 25px;

border:none;

background:#2563eb;

color:white;

border-radius:12px;

cursor:pointer;

}

.container{

width:90%;

max-width:1100px;

margin:40px auto;

}

.inputBox{

display:flex;

gap:15px;

margin-bottom:30px;

}

.inputBox input{

flex:1;

padding:16px;

border:none;

outline:none;

background:#1f2937;

color:white;

border-radius:12px;

font-size:16px;

}

.inputBox button{

padding:16px 25px;

background:#2563eb;

border:none;

color:white;

border-radius:12px;

cursor:pointer;

}

.list{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

}

.item{

background:#111827;

padding:20px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.item:hover{

transform:translateY(-5px);

border-color:#2563eb;

}

.item h3{

margin-bottom:10px;

}

.item p{

color:#94a3b8;

margin-bottom:20px;

}

.item button{

padding:10px 18px;

margin-right:10px;

border:none;

border-radius:10px;

cursor:pointer;

}

.open{

background:#2563eb;

color:white;

}

.delete{

background:#dc2626;

color:white;

}

footer{

text-align:center;

padding:40px;

color:#94a3b8;

}

</style>

</head>

<body>

<header>

<div class="logo">

📚 SearchHub Library

</div>

<button class="addBtn" onclick="saveItem()">

Save Current Search

</button>

</header>

<div class="container">

<div class="inputBox">

<input
type="text"
id="libraryInput"
placeholder="Enter title or search">

<button onclick="saveItem()">

Save

</button>

</div>

<div class="list" id="libraryList">

</div>

</div>

<footer>

©2026 SearchHub AI

</footer>

<script>

function saveItem(){

const input=document.getElementById("libraryInput");

const value=input.value.trim();

if(value===""){

alert("Enter something");

return;

}

let items=JSON.parse(localStorage.getItem("library"))||[];

items.unshift(value);

localStorage.setItem("library",JSON.stringify(items));

input.value="";

loadLibrary();

}

function deleteItem(index){

let items=JSON.parse(localStorage.getItem("library"))||[];

items.splice(index,1);

localStorage.setItem("library",JSON.stringify(items));

loadLibrary();

}

function loadLibrary(){

const list=document.getElementById("libraryList");

list.innerHTML="";

let items=JSON.parse(localStorage.getItem("library"))||[];

if(items.length===0){

list.innerHTML="<p>No saved items yet.</p>";

return;

}

items.forEach((item,index)=>{

list.innerHTML+=`

<div class="item">

<h3>${item}</h3>

<p>Saved in your SearchHub Library.</p>

<button class="open"
onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item)}')">

Open

</button>

<button class="delete"

onclick="deleteItem(${index})">

Delete

</button>

</div>

`;

});

}

loadLibrary();

</script>

</body>
</html>
