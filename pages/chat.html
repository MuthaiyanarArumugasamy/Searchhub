<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI Chat - SearchHub AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#0b1120;

color:white;

height:100vh;

display:flex;

flex-direction:column;

}

header{

height:70px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

background:#111827;

border-bottom:1px solid rgba(255,255,255,.08);

}

.logo{

font-size:25px;

font-weight:700;

}

.chat{

flex:1;

overflow-y:auto;

padding:40px;

}

.message{

margin-bottom:25px;

display:flex;

}

.user{

justify-content:flex-end;

}

.bot{

justify-content:flex-start;

}

.bubble{

max-width:70%;

padding:18px;

border-radius:16px;

line-height:1.7;

}

.user .bubble{

background:#2563eb;

}

.bot .bubble{

background:#1f2937;

}

.inputArea{

padding:20px;

display:flex;

gap:10px;

background:#111827;

}

.inputArea input{

flex:1;

padding:16px;

border:none;

outline:none;

background:#1f2937;

color:white;

border-radius:12px;

font-size:16px;

}

.inputArea button{

width:60px;

border:none;

background:#2563eb;

color:white;

border-radius:12px;

cursor:pointer;

font-size:20px;

}

</style>

</head>

<body>

<header>

<div class="logo">

🤖 SearchHub AI

</div>

<div>

<i class="fa-solid fa-user"></i>

</div>

</header>

<div class="chat" id="chat">

<div class="message bot">

<div class="bubble">

👋 Hello! Welcome to SearchHub AI.

How can I help you today?

</div>

</div>

</div>

<div class="inputArea">

<input

type="text"

id="prompt"

placeholder="Ask anything...">

<button onclick="sendMessage()">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<script>

function sendMessage(){

let input=document.getElementById("prompt");

let text=input.value.trim();

if(text==="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`

<div class="message user">

<div class="bubble">${text}</div>

</div>

`;

setTimeout(()=>{

chat.innerHTML+=`

<div class="message bot">

<div class="bubble">

This is a demo response.

Later we'll connect this page to an AI API like OpenAI or Gemini so it can answer your questions.

</div>

</div>

`;

chat.scrollTop=chat.scrollHeight;

},600);

input.value="";

}

</script>

</body>

</html>
