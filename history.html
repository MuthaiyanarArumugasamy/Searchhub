<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Search History | SearchHub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0b1120;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111827;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:28px;
font-weight:700;
}

.actions{
display:flex;
gap:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.clear{
background:#dc2626;
color:white;
}

.export{
background:#2563eb;
color:white;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
}

.history-item{
background:#111827;
padding:20px;
border-radius:18px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
}

.history-item:hover{
border-color:#2563eb;
transform:translateY(-4px);
}

.left h3{
margin-bottom:8px;
}

.left p{
color:#94a3b8;
}

.right{
display:flex;
gap:10px;
}

.searchBtn{
background:#2563eb;
color:white;
}

.deleteBtn{
background:#dc2626;
color:white;
}

.empty{
text-align:center;
padding:100px;
color:#94a3b8;
font-size:22px;
}

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="logo">

🕒 Search History

</div>

<div class="actions">

<button class="export" onclick="exportHistory()">

Export

</button>

<button class="clear" onclick="clearHistory()">

Clear All

</button>

</div>

</header>

<div class="container" id="historyContainer">

</div>

<footer>

©2026 SearchHub AI

</footer>

<script>

function loadHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[];

const container=document.getElementById("historyContainer");

container.innerHTML="";

if(history.length===0){

container.innerHTML='<div class="empty">No Search History Found</div>';

return;

}

history.forEach((item,index)=>{

container.innerHTML+=`

<div class="history-item">

<div class="left">

<h3>${item}</h3>

<p>Saved Search</p>

</div>

<div class="right">

<button class="searchBtn"

onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item)}')">

Search Again

</button>

<button class="deleteBtn"

onclick="deleteHistory(${index})">

Delete

</button>

</div>

</div>

`;

});

}

function deleteHistory(index){

let history=JSON.parse(localStorage.getItem("history"))||[];

history.splice(index,1);

localStorage.setItem("history",JSON.stringify(history));

loadHistory();

}

function clearHistory(){

if(confirm("Clear all history?")){

localStorage.removeItem("history");

loadHistory();

}

}

function exportHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let text=history.join("\n");

let blob=new Blob([text],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="search_history.txt";

a.click();

}

loadHistory();

</script>

</body>

</html>
